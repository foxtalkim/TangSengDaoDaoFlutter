name: foxtalk
description: "FoxTalk — IM client."
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: ^3.11.3
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  flutter_native_splash: ^2.4.0
  dio: ^5.9.2
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.3
  permission_handler: ^12.0.1
  audio_session: ^0.2.3
  cached_network_image: ^3.4.1
  crypto: ^3.0.7
  shared_preferences: ^2.5.5
  sqflite: ^2.4.1
  path: ^1.9.0
  uuid: ^4.5.3
  wukongimfluttersdk: ^1.7.9
  forui: ^0.21.3
  image_picker: ^1.2.2
  pro_image_editor: ^12.4.4
  gal: ^2.3.0
  record: ^6.2.0
  audioplayers: ^6.1.0
  path_provider: ^2.1.5
  qr_flutter: ^4.1.0
  qr_code_scanner_plus: ^2.1.1
  flutter_contacts: ^2.0.2
  url_launcher: ^6.3.2
  flutter_svg: ^2.0.10+1
  flutter_slidable: ^4.0.0
  screen_capture_event: ^1.2.0
  flutter_tabler_icons: ^1.43.0
  flutter_dynamic_icon_plus: ^1.4.0
  geolocator: ^14.0.2
  wechat_camera_picker: ^4.5.0
  wechat_assets_picker: ^10.1.2
  reorderables: ^0.6.0
  firebase_core: ^3.15.0
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^18.0.1
  flutter_callkit_incoming: ^3.0.0
dependency_overrides:
  wukongimfluttersdk:
    path: packages/wukongimfluttersdk_patched

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icons/foxtalk-app-icon-01.png"
  remove_alpha_ios: true
  background_color_ios: "#ffffff"
flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#0F0F12"
  image: "assets/icons/launch_image.png"
  image_dark: "assets/icons/launch_image.png"
  android_12:
    image: "assets/icons/launch_image.png"
    image_dark: "assets/icons/launch_image.png"
    icon_background_color: "#FFFFFF"
    icon_background_color_dark: "#0F0F12"
flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/icons/moyu/
    - assets/icons/foxtalk-app-icon-01.png
    - assets/icons/foxtalk-app-icon-02.png
    - assets/icons/foxtalk-app-icon-03.png
    - assets/icons/foxtalk-app-icon-04.png
    - assets/icons/foxtalk-app-icon-05.png
    - assets/icons/official-badge.png
    - assets/avatar.png
    - assets/auth_illustrations/
    - assets/onboarding_illustrations/
    - assets/emoji/
    - assets/emoji_stickers/
    - assets/sounds/call.aac
    - assets/sounds/receive.caf
    - assets/sounds/hangup.wav
